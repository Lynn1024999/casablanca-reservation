<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡薩布蘭加 · 店家後台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b8975a; --gold-light: #d4b57a; --gold-pale: #f5edd8;
    --cream: #faf7f2; --dark: #2c2416; --mid: #6b5c3e; --soft: #a89270;
    --border: #e0d4bb; --white: #ffffff; --success: #4a7c59; --danger: #8b3a3a;
    --shadow: 0 2px 20px rgba(44,36,22,0.08); --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

  /* ── TOP NAV ── */
  .top-nav { background: var(--dark); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; position: sticky; top: 0; z-index: 100; }
  .top-nav .logo { font-family: 'Noto Serif TC', serif; color: var(--gold-light); font-size: 15px; letter-spacing: 2px; }
  .top-nav .badge { font-size: 11px; color: var(--soft); letter-spacing: 1px; }

  /* ── LOGIN GATE ── */
  .login-wrap { max-width: 380px; margin: 80px auto; padding: 0 16px; }
  .login-card { background: white; border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); text-align: center; }
  .login-icon { font-size: 32px; margin-bottom: 12px; }
  .login-title { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--dark); margin-bottom: 6px; }
  .login-sub { font-size: 12px; color: var(--soft); margin-bottom: 24px; }
  .form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--dark); background: var(--cream); outline: none; margin-bottom: 12px; }
  .form-input:focus { border-color: var(--gold); background: white; }
  .login-btn { width: 100%; padding: 11px; background: var(--dark); color: white; border: none; border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; letter-spacing: 1px; transition: background .2s; }
  .login-btn:hover { background: var(--mid); }
  .login-error { font-size: 12px; color: var(--danger); margin-top: 8px; display: none; }

  /* ── ADMIN WRAP ── */
  .admin-wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; display: none; }
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .admin-title { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--dark); }
  .admin-subtitle { font-size: 12px; color: var(--soft); margin-top: 2px; }

  .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  @media (max-width:600px) { .stat-grid { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .stat-card .s-label { font-size: 11px; color: var(--soft); letter-spacing: .5px; margin-bottom: 6px; }
  .stat-card .s-value { font-size: 26px; font-weight: 500; color: var(--dark); }
  .stat-card .s-unit { font-size: 12px; color: var(--soft); margin-left: 3px; }
  .stat-card .s-sub { font-size: 11px; color: var(--success); margin-top: 4px; }

  .date-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
  .date-tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1.5px solid var(--border); background: white; white-space: nowrap; transition: all .2s; color: var(--mid); }
  .date-tab.active { background: var(--gold); color: white; border-color: var(--gold); }

  .res-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .res-card { background: white; border-radius: 10px; padding: 14px 18px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; }
  .res-time { font-size: 18px; font-weight: 500; color: var(--gold); min-width: 50px; text-align: center; }
  .res-time .period { font-size: 10px; color: var(--soft); display: block; }
  .res-divider { width: 1px; height: 40px; background: var(--border); }
  .res-info { flex: 1; }
  .res-name { font-size: 14px; font-weight: 500; color: var(--dark); }
  .res-meta { font-size: 12px; color: var(--soft); margin-top: 2px; }
  .res-orders { font-size: 12px; color: var(--mid); margin-top: 4px; }
  .res-pax { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .pax-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--gold-pale); color: var(--gold); font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center; }
  .pax-text { font-size: 10px; color: var(--soft); }

  .supply-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
  @media (max-width:600px) { .supply-grid { grid-template-columns: repeat(2,1fr); } }
  .supply-item { background: white; border-radius: 10px; padding: 14px; box-shadow: var(--shadow); }
  .supply-item .s-name { font-size: 12px; color: var(--mid); margin-bottom: 6px; }
  .supply-item .s-qty { font-size: 22px; font-weight: 500; color: var(--dark); }
  .supply-item .s-unit2 { font-size: 11px; color: var(--soft); margin-left: 3px; }

  .section-title { font-family: 'Noto Serif TC', serif; font-size: 15px; color: var(--dark); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .section-divider { height: 1px; background: var(--border); margin: 28px 0; }

  .csv-btn { padding: 6px 14px; background: var(--dark); color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; transition: background .2s; letter-spacing: .5px; }
  .csv-btn:hover { background: var(--mid); }



  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
  .tag-gold { background: var(--gold-pale); color: var(--gold); }

  /* 載入中 */
  #global-loading { display:none; position:fixed; top:52px; left:0; right:0; background:var(--gold); color:white; text-align:center; padding:8px; font-size:13px; z-index:999; letter-spacing:1px; }

  .logout-btn { font-size: 12px; color: var(--soft); background: none; border: 1px solid #444; border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: all .2s; }
  .logout-btn:hover { color: white; border-color: white; }
</style>
<!-- cloudflare-disable-email-obfuscation -->
</head>
<body>

<div id="global-loading"></div>

<nav class="top-nav">
  <div class="logo">卡薩布蘭加 · 店家管理</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="badge" id="admin-account"></span>
    <button class="logout-btn" onclick="doLogout()" style="display:none" id="logout-btn">登出</button>
  </div>
</nav>

<!-- ── 登入 ── -->
<div class="login-wrap" id="login-section">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">店家後台登入</div>
    <div class="login-sub">請輸入店家密碼</div>
    <input class="form-input" type="password" id="pw-input" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登 入</button>
    <div class="login-error" id="login-error">密碼錯誤，請再試一次</div>
  </div>
</div>

<!-- ── 後台主體 ── -->
<div class="admin-wrap" id="admin-section">

  <div class="admin-header">
    <div>
      <div class="admin-title">預約管理後台</div>
      <div class="admin-subtitle">預約統計 · 備料清單 · 會員管理</div>
    </div>
    <button class="csv-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
  </div>

  <!-- 統計卡 -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="s-label">選定日期預約</div>
      <div><span class="s-value" id="stat-res">—</span><span class="s-unit">筆</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label">選定日期來客</div>
      <div><span class="s-value" id="stat-pax">—</span><span class="s-unit">人</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label">會員人數</div>
      <div><span class="s-value" id="stat-members">—</span><span class="s-unit">人</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label">累計預約</div>
      <div><span class="s-value" id="stat-total">—</span><span class="s-unit">筆</span></div>
    </div>
  </div>

  <!-- 日期分頁 -->
  <div class="date-tabs" id="admin-date-tabs"></div>

  <!-- 預約清單 -->
  <div class="section-title">
    <span id="admin-date-label">預約清單</span>
  </div>
  <div class="res-list" id="admin-res-list"></div>

  <div class="section-divider"></div>

  <!-- 備料清單 -->
  <div class="section-title">
    <span>備料清單（<span id="supply-date-label">—</span>）</span>
  </div>
  <div class="supply-grid" id="supply-grid"></div>

</div><!-- /admin-wrap -->

<script>
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwkmtjTY17bFra0Q4dX4JGjbVUW4f6G1FPSCNbxttPJH3kD7tjuhxLA34XMF7_qMqtrFA/exec';

var adminDates = [], adminDateIdx = 0, allRes = [], menuCatMap = {};

function showLoading(msg){ try { var el=document.getElementById('global-loading')||document.getElementById('loading-bar'); if(el){el.textContent=msg||'載入中…'; el.style.display='block';} } catch(e){} }
function hideLoading(){ try { var el=document.getElementById('global-loading')||document.getElementById('loading-bar'); if(el) el.style.display='none'; } catch(e){} }

function api(action, params, callback) {
  params = params || {}; params.action = action;
  fetch(GAS_API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: Object.keys(params).map(function(k){
      return encodeURIComponent(k)+'='+encodeURIComponent(
        typeof params[k]==='object' ? JSON.stringify(params[k]) : params[k]
      );
    }).join('&')
  })
  .then(function(res) { return res.json(); })
  .then(function(data) { if(callback) callback(data); })
  .catch(function(e) { try{hideLoading();}catch(ex){} alert('連線錯誤：' + e.message); });
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('pw-input').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
});

function doLogin() {
  var pw = document.getElementById('pw-input').value;
  api('verifyAdmin', {password: pw}, function(res) {
    if (res.success) {
      var ls = document.getElementById('login-section');
      var as = document.getElementById('admin-section');
      if (ls) ls.style.display = 'none';
      if (as) as.style.display = 'block';
      initAdmin();
    } else {
      var errEl = document.getElementById('login-error');
      if (errEl) errEl.style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  });
}

function doLogout() { location.reload(); }

function initAdmin() {
  api('getConfig', {}, function(res) {
    buildAdminDates(res.success ? res.config : {});
  });
  // 載入菜單分類對應表
  api('getMenu', {}, function(res) {
    if (res.success && res.menu) {
      Object.keys(res.menu).forEach(function(cat) {
        res.menu[cat].forEach(function(item) {
          menuCatMap[item.name] = cat;
        });
      });
    }
  });
}

function buildAdminDates(config) {
  var tabs = document.getElementById('admin-date-tabs');
  var now = new Date(), days = ['日','一','二','三','四','五','六'];
  var openDays = String(config.open_days||'3,4,5').split(',').map(Number);
  tabs.innerHTML = ''; adminDates = [];
  var count = 0;
  for (var i=0; i<=30 && count<6; i++) {
    var d = new Date(now); d.setDate(now.getDate()+i);
    if (openDays.indexOf(d.getDay())===-1) continue;
    var dateStr = (d.getMonth()+1)+'/'+d.getDate()+' （週'+days[d.getDay()]+'）';
    adminDates.push(dateStr);
    var idx = count;
    var btn = document.createElement('div');
    btn.className = 'date-tab'+(count===0?' active':'');
    btn.textContent = dateStr;
    (function(b, i2){ b.onclick = function(){
      document.querySelectorAll('.date-tab').forEach(function(t){t.classList.remove('active');});
      b.classList.add('active'); adminDateIdx=i2; loadDateData(i2);
    }; })(btn, idx);
    tabs.appendChild(btn); count++;
  }
  if (count > 0) loadDateData(0);
}

// 計算訂單金額（含能量球3倍優惠）
function calcTotal(orders) {
  if (!orders) return 0;
  var total = 0;

  // 能量球定義：名稱 -> {單價, 3個價}
  var energyBalls = {
    '經典紓壓能量球':         { single: 75, triple: 190 },
    '花生燕麥能量球':         { single: 60, triple: 145 },
    '堅果巧克力能量球':       { single: 60, triple: 145 }
  };
  // 低價能量球（60元類）可混搭：統計總數後一起算
  var mixBalls = ['花生燕麥能量球', '堅果巧克力能量球'];
  var mixBallTotal = 0;

  var items = [];
  orders.split(',').forEach(function(o) {
    var m = o.trim().match(/^(.+?)×(\d+)$/);
    if (!m) return;
    items.push({ name: m[1].trim(), qty: parseInt(m[2]) });
  });

  items.forEach(function(item) {
    var name = item.name, qty = item.qty;

    if (name === '經典紓壓能量球') {
      // 獨立計算：每3個用190，剩餘用75
      var sets = Math.floor(qty / 3);
      var rem  = qty % 3;
      total += sets * 190 + rem * 75;
    } else if (mixBalls.indexOf(name) !== -1) {
      // 混搭計算：累計數量
      mixBallTotal += qty;
    } else {
      // 一般品項：從菜單取價格
      var price = 0;
      Object.keys(menuCatMap).length; // ensure map loaded
      // Try to find price from orders string (GAS returns price in orders? No - use hardcoded fallback)
      // We'll rely on the menu data loaded in menuCatMap
      // But menuCatMap only has cat, not price - so use a simple price lookup
      price = getItemPrice(name);
      total += price * qty;
    }
  });

  // 計算混搭能量球（60元類）
  if (mixBallTotal > 0) {
    var sets = Math.floor(mixBallTotal / 3);
    var rem  = mixBallTotal % 3;
    total += sets * 145 + rem * 60;
  }

  return total;
}

// 品項價格對照（與菜單一致）
var PRICE_MAP = {
  '有機冰滴拿鐵（招牌）':250,'有機冰滴咖啡':250,'有機愛爾蘭拿鐵':250,
  '有機黑糖拿鐵':180,'有機棉花糖拿鐵':180,'有機楓糖拿鐵':180,
  '有機焦糖拿鐵':180,'有機原味拿鐵':180,'阿芙加朵（冰淇淋+濃縮）':250,
  '有機美式咖啡':160,'有機義式濃縮咖啡':160,
  '有機智慧女神茶':180,'有機維納斯美神茶':180,'有機紓壓放鬆茶':180,
  '有機南非醉茄茶（印度人蔘）':180,'有機北美松葉茶':180,'有機蓮花圓滿茶':180,
  '有機南非國寶茶':180,'有機日月潭紅玉（台茶18號）':180,
  '有機英式伯爵茶':140,'有機茉莉綠茶':140,
  '有機牛蒡養生茶':160,'有機山苦瓜平衡茶':160,
  '鷹嘴豆蛋沙拉三明治':180,'鮪魚蘋果三明治':180,'家常泡麵（辣）':160,
  '綠色活氧蔬果汁':190,'紅色元氣蔬果汁':190,
  '經典爆米花－焦糖奶油':100,'經典爆米花－鹹甜肉桂':100,
  '紅豆紫米粥（溫熱）':80,'花生杏仁湯（溫熱）':80,
  '養生芝麻糊（溫熱）':80,'冰淇淋':120,'水果雪酪（限量）':150
};
function getItemPrice(name) { return PRICE_MAP[name] || 0; }

function loadDateData(idx) {
  var dateStr = adminDates[idx]; if (!dateStr) return;
  document.getElementById('admin-date-label').textContent = dateStr+' 預約清單';
  document.getElementById('supply-date-label').textContent = dateStr;
  showLoading('載入預約資料…');
  api('getReservations', {date: dateStr}, function(res) {
    hideLoading();
    var reservations = res.success ? res.reservations : [];
    allRes = reservations;
    var active = reservations.filter(function(r){return r.status!=='已取消';});
    document.getElementById('stat-res').textContent = active.length;
    document.getElementById('stat-pax').textContent = active.reduce(function(s,r){return s+Number(r.pax);},0);

    var drinkKeys=/咖啡|拿鐵|美式|濃縮|冰滴|茶|蔬果汁|阿芙/;
    var foodKeys=/三明治|泡麵|能量|爆米花|粥|湯|芝麻|冰淇淋|雪酪/;
    var drinks=0, foods=0;
    active.forEach(function(r){
      String(r.orders||'').split(',').forEach(function(o){
        var m=o.trim().match(/^(.+?)×(\d+)$/);
        if(m){if(drinkKeys.test(m[1]))drinks+=parseInt(m[2]);else if(foodKeys.test(m[1]))foods+=parseInt(m[2]);}
      });
    });
    var sd=document.getElementById('stat-drinks'); if(sd) sd.textContent = drinks||'0';
    var sf=document.getElementById('stat-food'); if(sf) sf.textContent = foods||'0';

    var list = document.getElementById('admin-res-list');
    document.getElementById('admin-date-label').textContent = dateStr+' 預約清單（'+active.length+' 筆）';
    if (reservations.length===0) {
      list.innerHTML = '<div style="text-align:center;color:var(--soft);padding:30px;background:white;border-radius:10px;">本日暫無預約</div>';
    } else {
      list.innerHTML = reservations.map(function(r) {
        var cancelled = r.status==='已取消';
        var cs = cancelled ? 'opacity:.45;text-decoration:line-through;' : '';
        return '<div class="res-card" style="'+cs+'">'+
          '<div class="res-time">'+r.time+'<span class="period">入座</span></div>'+
          '<div class="res-divider"></div>'+
          '<div class="res-info">'+
            '<div class="res-name">'+r.name+' <span class="tag tag-gold">會員</span>'+
            (cancelled?'<span style="font-size:11px;color:var(--danger);background:#fde8e8;padding:2px 6px;border-radius:4px;margin-left:4px;">已取消</span>':'')+
            '</div>'+
            '<div class="res-meta">'+r.pax+' 位</div>'+
            '<div class="res-orders">📋 '+(r.orders||'未選餐飲')+'</div>'+
            '<div style="font-size:12px;color:var(--gold);margin-top:3px;font-weight:500;">💰 預估 $'+calcTotal(r.orders)+'</div>'+
            (r.notes?'<div style="font-size:11px;color:var(--danger);margin-top:3px;">💬 '+r.notes+'</div>':'')+
          '</div>'+
          '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">'+
            '<div class="pax-circle">'+r.pax+'</div>'+
            '<div style="font-size:10px;color:var(--soft);">人</div>'+
            (!cancelled?'<button data-orderid="'+r.orderId+'" onclick="cancelRes(this.dataset.orderid)" style="font-size:11px;padding:3px 8px;border:1px solid var(--danger);background:white;color:var(--danger);border-radius:4px;cursor:pointer;">取消</button>':'')+
          '</div>'+
        '</div>';
      }).join('');
    }

    renderSupply(reservations);
  });
}

function cancelRes(orderId) {
  if (!confirm('確定要取消預約 '+orderId+'？')) return;
  showLoading('處理中…');
  api('cancelReservation', {orderId: orderId}, function(res) {
    hideLoading();
    if (res.success) loadDateData(adminDateIdx);
    else alert('取消失敗：'+(res.error||'請稍後再試'));
  });
}

function renderSupply(reservations) {
  var catLabels={coffee:'☕ 飲品',tea:'☕ 飲品',food:'🥪 餐點',energy:'⚡ 能量球',snack:'🍿 點心',other:'其他'};
  // coffee 和 tea 合併為「飲料」
  var catMerge={coffee:'drink',tea:'drink',food:'food',energy:'energy',snack:'snack',other:'snack'};
  var catDisplay={drink:'☕ 飲料',food:'🥪 餐點',energy:'⚡ 能量球',snack:'🍿 點心 & 其他'};
  var slots={am:{label:'下午場 13:00–17:00',res:[]},pm:{label:'晚上場 17:00–21:00',res:[]}};
  reservations.forEach(function(r){
    if(r.status==='已取消') return;
    var h=parseInt((r.time||'0').split(':')[0]);
    if(h<17) slots.am.res.push(r); else slots.pm.res.push(r);
  });

  function tallySlot(list){
    var cats={};
    list.forEach(function(r){
      String(r.orders||'').split(',').forEach(function(o){
        var m=o.trim().match(/^(.+?)×(\d+)$/); if(!m) return;
        var name=m[1].trim(), qty=parseInt(m[2]);
        // Use categorized data from backend if available
        var rawCat = menuCatMap[name] || 'other';
        var cat = catMerge[rawCat] || 'snack';
        if(!cats[cat]) cats[cat]=[];
        var existing = cats[cat].find(function(i){return i.name===name;});
        if(existing) existing.qty+=qty; else cats[cat].push({name:name,qty:qty});
      });
    });
    return cats;
  }

  var html='';
  ['am','pm'].forEach(function(slot){
    var s=slots[slot], cats=tallySlot(s.res);
    var hasAny=Object.keys(cats).length>0;
    html+='<div style="margin-bottom:20px;">';
    html+='<div style="font-size:13px;font-weight:500;color:var(--dark);margin-bottom:10px;padding:6px 12px;background:var(--gold-pale);border-radius:6px;">'+s.label+'（'+s.res.length+' 桌）</div>';
    if(!hasAny){ html+='<div style="font-size:12px;color:var(--soft);padding:0 4px;">無需備料</div>'; }
    else {
      ['drink','food','energy','snack'].forEach(function(cat){
        var items=cats[cat]; if(!items||items.length===0) return;
        html+='<div style="margin-bottom:8px;">';
        html+='<div style="font-size:11px;color:var(--soft);margin-bottom:4px;">'+(catDisplay[cat]||cat)+'</div>';
        html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">';
        items.forEach(function(item){
          html+='<div class="supply-item" style="padding:10px;"><div class="s-name">'+item.name+'</div><div><span class="s-qty">'+item.qty+'</span><span class="s-unit2">份</span></div></div>';
        });
        html+='</div></div>';
      });
    }
    html+='</div>';
  });
  document.getElementById('supply-grid').innerHTML=html;
}


function exportCSV() {
  var rows=[['預約日期','時段','姓名','人數','點餐內容','備註','狀態']];
  allRes.forEach(function(r){
    rows.push([r.date||adminDates[adminDateIdx],r.time,r.name,r.pax,r.orders,r.notes,r.status]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='卡薩布蘭加預約清單.csv'; a.click();
}
</script>
