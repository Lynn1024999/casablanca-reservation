<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡薩布蘭加 · 店家後台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b8975a; --gold-light: #d4b57a; --gold-pale: #f5edd8;
    --cream: #faf7f2; --dark: #2c2416; --mid: #6b5c3e; --soft: #a89270;
    --border: #e0d4bb; --white: #ffffff; --success: #4a7c59; --danger: #8b3a3a;
    --shadow: 0 2px 20px rgba(44,36,22,0.08); --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

  /* ── TOP NAV ── */
  .top-nav { background: var(--dark); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; position: sticky; top: 0; z-index: 100; }
  .top-nav .logo { font-family: 'Noto Serif TC', serif; color: var(--gold-light); font-size: 15px; letter-spacing: 2px; }
  .top-nav .badge { font-size: 11px; color: var(--soft); letter-spacing: 1px; }

  /* ── LOGIN GATE ── */
  .login-wrap { max-width: 380px; margin: 80px auto; padding: 0 16px; }
  .login-card { background: white; border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); text-align: center; }
  .login-icon { font-size: 32px; margin-bottom: 12px; }
  .login-title { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--dark); margin-bottom: 6px; }
  .login-sub { font-size: 12px; color: var(--soft); margin-bottom: 24px; }
  .form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--dark); background: var(--cream); outline: none; margin-bottom: 12px; }
  .form-input:focus { border-color: var(--gold); background: white; }
  .login-btn { width: 100%; padding: 11px; background: var(--dark); color: white; border: none; border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; letter-spacing: 1px; transition: background .2s; }
  .login-btn:hover { background: var(--mid); }
  .login-error { font-size: 12px; color: var(--danger); margin-top: 8px; display: none; }

  /* ── ADMIN WRAP ── */
  .admin-wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; display: none; }
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .admin-title { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--dark); }
  .admin-subtitle { font-size: 12px; color: var(--soft); margin-top: 2px; }

  .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  @media (max-width:600px) { .stat-grid { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .stat-card .s-label { font-size: 11px; color: var(--soft); letter-spacing: .5px; margin-bottom: 6px; }
  .stat-card .s-value { font-size: 26px; font-weight: 500; color: var(--dark); }
  .stat-card .s-unit { font-size: 12px; color: var(--soft); margin-left: 3px; }
  .stat-card .s-sub { font-size: 11px; color: var(--success); margin-top: 4px; }

  .date-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
  .date-tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1.5px solid var(--border); background: white; white-space: nowrap; transition: all .2s; color: var(--mid); }
  .date-tab.active { background: var(--gold); color: white; border-color: var(--gold); }

  .res-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .res-card { background: white; border-radius: 10px; padding: 14px 18px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; }
  .res-time { font-size: 18px; font-weight: 500; color: var(--gold); min-width: 50px; text-align: center; }
  .res-time .period { font-size: 10px; color: var(--soft); display: block; }
  .res-divider { width: 1px; height: 40px; background: var(--border); }
  .res-info { flex: 1; }
  .res-name { font-size: 14px; font-weight: 500; color: var(--dark); }
  .res-meta { font-size: 12px; color: var(--soft); margin-top: 2px; }
  .res-orders { font-size: 12px; color: var(--mid); margin-top: 4px; }
  .res-pax { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .pax-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--gold-pale); color: var(--gold); font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center; }
  .pax-text { font-size: 10px; color: var(--soft); }

  .supply-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
  @media (max-width:600px) { .supply-grid { grid-template-columns: repeat(2,1fr); } }
  .supply-item { background: white; border-radius: 10px; padding: 14px; box-shadow: var(--shadow); }
  .supply-item .s-name { font-size: 12px; color: var(--mid); margin-bottom: 6px; }
  .supply-item .s-qty { font-size: 22px; font-weight: 500; color: var(--dark); }
  .supply-item .s-unit2 { font-size: 11px; color: var(--soft); margin-left: 3px; }

  .section-title { font-family: 'Noto Serif TC', serif; font-size: 15px; color: var(--dark); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .section-divider { height: 1px; background: var(--border); margin: 28px 0; }

  .csv-btn { padding: 6px 14px; background: var(--dark); color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; transition: background .2s; letter-spacing: .5px; }
  .csv-btn:hover { background: var(--mid); }

  /* 會員名單 */
  .member-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
  @media (max-width:600px) { .member-grid { grid-template-columns: 1fr; } }
  .member-card { background: white; border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
  .member-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--gold); color: white; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .member-name { font-size: 14px; font-weight: 500; color: var(--dark); }
  .member-org { font-size: 11px; color: var(--soft); margin-top: 2px; }
  .member-contact { font-size: 11px; color: var(--mid); margin-top: 2px; }

  .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .history-table th { text-align: left; padding: 8px 12px; background: var(--cream); color: var(--soft); font-weight: 400; font-size: 11px; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  .history-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--dark); }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: var(--cream); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
  .tag-gold { background: var(--gold-pale); color: var(--gold); }

  /* 載入中 */
  #global-loading { display:none; position:fixed; top:52px; left:0; right:0; background:var(--gold); color:white; text-align:center; padding:8px; font-size:13px; z-index:999; letter-spacing:1px; }

  .logout-btn { font-size: 12px; color: var(--soft); background: none; border: 1px solid #444; border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: all .2s; }
  .logout-btn:hover { color: white; border-color: white; }
</style>
<!-- cloudflare-disable-email-obfuscation -->
</head>
<body>

<div id="global-loading"></div>

<nav class="top-nav">
  <div class="logo">卡薩布蘭加 · 店家管理</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="badge" id="admin-account"></span>
    <button class="logout-btn" onclick="logout()" style="display:none" id="logout-btn">登出</button>
  </div>
</nav>

<!-- ── 登入 ── -->
<div class="login-wrap" id="login-section">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">店家後台登入</div>
    <div class="login-sub">請輸入店家密碼</div>
    <input class="form-input" type="password" id="pw-input" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登 入</button>
    <div class="login-error" id="login-error">密碼錯誤，請再試一次</div>
  </div>
</div>

<!-- ── 後台主體 ── -->
<div class="admin-wrap" id="admin-section">

  <div class="admin-header">
    <div>
      <div class="admin-title">預約管理後台</div>
      <div class="admin-subtitle">預約統計 · 備料清單 · 會員管理</div>
    </div>
    <button class="csv-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
  </div>

  <!-- 統計卡 -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="s-label">選定日期預約</div>
      <div><span class="s-value" id="stat-res">—</span><span class="s-unit">筆</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label">選定日期來客</div>
      <div><span class="s-value" id="stat-pax">—</span><span class="s-unit">人</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label">會員人數</div>
      <div><span class="s-value" id="stat-members">—</span><span class="s-unit">人</span></div>
    </div>
    <div class="stat-card">
      <div class="s-label">累計預約</div>
      <div><span class="s-value" id="stat-total">—</span><span class="s-unit">筆</span></div>
    </div>
  </div>

  <!-- 日期分頁 -->
  <div class="date-tabs" id="admin-date-tabs"></div>

  <!-- 預約清單 -->
  <div class="section-title">
    <span id="admin-date-label">預約清單</span>
  </div>
  <div class="res-list" id="admin-res-list"></div>

  <div class="section-divider"></div>

  <!-- 備料清單 -->
  <div class="section-title">
    <span>備料清單（<span id="supply-date-label">—</span>）</span>
  </div>
  <div class="supply-grid" id="supply-grid"></div>

  <div class="section-divider"></div>

  <!-- 會員名單 -->
  <div class="section-title">
    <span>會員名單</span>
    <span style="font-size:12px;color:var(--soft);">資料存於 Google Sheets，可直接在試算表新增/刪除</span>
  </div>
  <div class="member-grid" id="member-grid">
    <div style="color:var(--soft);font-size:13px;grid-column:1/-1;">載入中…</div>
  </div>

  <div class="section-divider"></div>

  <!-- 歷史紀錄 -->
  <div class="section-title"><span>所有預約歷史</span></div>
  <div style="background:white;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);">
    <table class="history-table">
      <thead>
        <tr>
          <th>姓名</th><th>日期</th><th>時段</th><th>人數</th><th>點餐</th><th>狀態</th>
        </tr>
      </thead>
      <tbody id="history-tbody"></tbody>
    </table>
  </div>

</div><!-- /admin-wrap -->

<script type="text/javascript" data-cfasync="false">
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkmtjTY17bFra0Q4dX4JGjbVUW4f6G1FPSCNbxttPJH3kD7tjuhxLA34XMF7_qMqtrFA/exec';
const API_TOKEN  = 'casablanca_2026_tk';
// ── 簡易密碼保護（可在此修改密碼）──
const ADMIN_PASSWORD = 'casablanca2026';

// ── 登入 ──
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    showAdmin();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function logout() {
  sessionStorage.removeItem('admin_auth');
  document.getElementById('admin-section').style.display = 'none';
  document.getElementById('login-section').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('pw-input').value = '';
}
function showAdmin() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('admin-section').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'block';
  initAdmin();
}

// ── 啟動 ──
document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('admin_auth') === '1') showAdmin();
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

// ── API（JSONP，繞過 CORS）──
function api(action, params) {
  params = params || {};
  return new Promise(function(resolve, reject) {
    var cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    var url = new URL(SCRIPT_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', cbName);
    url.searchParams.set('token', API_TOKEN);
    Object.keys(params).forEach(function(k) { url.searchParams.set(k, params[k]); });

    var timer = setTimeout(function() {
      delete window[cbName];
      reject(new Error('timeout'));
    }, 15000);

    window[cbName] = function(data) {
      clearTimeout(timer);
      delete window[cbName];
      if (sc && sc.parentNode) sc.parentNode.removeChild(sc);
      resolve(data);
    };

    var sc = document.createElement('script');
    sc.src = url.toString();
    sc.onerror = function() {
      clearTimeout(timer);
      delete window[cbName];
      reject(new Error('script error'));
    };
    document.head.appendChild(sc);
  });
}
function showLoading(msg='載入中…') {
  const el = document.getElementById('global-loading');
  el.textContent = msg; el.style.display = 'block';
}
function hideLoading() { document.getElementById('global-loading').style.display = 'none'; }

// ── 初始化後台 ──
let adminDates = [];
let adminDateIdx = 0;
let allReservations = [];

async function initAdmin() {
  showLoading('載入資料…');
  try {
    const configRes = await api('getConfig');
    const config = configRes.success ? configRes.config : {};
    buildAdminDates(config);
    await loadMembers();
  } catch(e) {
    hideLoading();
    alert('連線失敗，請確認 Apps Script 已正確部署');
  }
}

// ── 日期分頁 ──
function buildAdminDates(config) {
  const tabs = document.getElementById('admin-date-tabs');
  const now  = new Date();
  const days = ['日','一','二','三','四','五','六'];
  const openDays = String(config.open_days || '3,4,5').split(',').map(Number);
  tabs.innerHTML = '';
  adminDates = [];

  let count = 0;
  for (let i = 0; i <= 30 && count < 6; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    if (!openDays.includes(d.getDay())) continue;
    const dateStr = `${d.getMonth()+1}/${d.getDate()} （週${days[d.getDay()]}）`;
    adminDates.push(dateStr);
    const idx = count;
    const btn = document.createElement('div');
    btn.className = 'date-tab' + (count === 0 ? ' active' : '');
    btn.textContent = dateStr;
    btn.onclick = () => {
      document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      adminDateIdx = idx;
      loadDateData(idx);
    };
    tabs.appendChild(btn);
    count++;
  }
  if (count > 0) loadDateData(0);
}

// ── 取消預約 ──
async function cancelReservation(orderId) {
  if (!confirm('確定要取消預約 ' + orderId + '？')) return;
  showLoading('處理中…');
  try {
    const res = await api('cancelReservation', { orderId: orderId });
    hideLoading();
    if (res.success) {
      loadDateData(adminDateIdx);
    } else {
      alert('取消失敗：' + (res.error || '請稍後再試'));
    }
  } catch(e) {
    hideLoading();
    alert('連線錯誤，請稍後再試');
  }
}

// ── 備料分類分時段 ──
function renderSupply(reservations) {
  const drinkKeys  = /咖啡|拿鐵|美式|濃縮|冰滴|茶|蔬果汁|阿芙/;
  const foodKeys   = /三明治|泡麵/;
  const energyKeys = /能量球/;
  const snackKeys  = /爆米花|粥|湯|芝麻|冰淇淋|雪酪/;

  const slots = {
    am: { label: '下午場 13:00–17:00', res: [] },
    pm: { label: '晚上場 17:00–21:00', res: [] }
  };
  reservations.forEach(function(r) {
    if (r.status === '已取消') return;
    var h = parseInt((r.time || '0').split(':')[0]);
    if (h < 17) slots.am.res.push(r); else slots.pm.res.push(r);
  });

  function tally(resList) {
    var cats = { drink: {}, food: {}, energy: {}, snack: {} };
    resList.forEach(function(r) {
      String(r.orders || '').split(',').forEach(function(o) {
        var m = o.trim().match(/^(.+?)×(\d+)$/);
        if (!m) return;
        var name = m[1].trim(), qty = parseInt(m[2]);
        var cat = drinkKeys.test(name) ? 'drink' : foodKeys.test(name) ? 'food' : energyKeys.test(name) ? 'energy' : snackKeys.test(name) ? 'snack' : null;
        if (cat) cats[cat][name] = (cats[cat][name] || 0) + qty;
      });
    });
    return cats;
  }

  var catLabels = { drink: '☕ 飲品', food: '🥪 餐點', energy: '⚡ 能量球', snack: '🍿 點心' };
  var html = '';

  ['am','pm'].forEach(function(slot) {
    var s = slots[slot];
    var cats = tally(s.res);
    var hasAny = Object.values(cats).some(function(c) { return Object.keys(c).length > 0; });
    html += '<div style="margin-bottom:20px;">';
    html += '<div style="font-size:13px;font-weight:500;color:var(--dark);margin-bottom:10px;padding:6px 12px;background:var(--gold-pale);border-radius:6px;">' + s.label + '（' + s.res.length + ' 桌）</div>';
    if (!hasAny) {
      html += '<div style="font-size:12px;color:var(--soft);padding:0 4px;">無需備料</div>';
    } else {
      Object.keys(catLabels).forEach(function(cat) {
        var items = cats[cat];
        if (Object.keys(items).length === 0) return;
        html += '<div style="margin-bottom:8px;">';
        html += '<div style="font-size:11px;color:var(--soft);margin-bottom:4px;">' + catLabels[cat] + '</div>';
        html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">';
        Object.entries(items).forEach(function(entry) {
          html += '<div class="supply-item" style="padding:10px;">';
          html += '<div class="s-name">' + entry[0] + '</div>';
          html += '<div><span class="s-qty">' + entry[1] + '</span><span class="s-unit2">份</span></div>';
          html += '</div>';
        });
        html += '</div></div>';
      });
    }
    html += '</div>';
  });

  document.getElementById('supply-grid').innerHTML = html;
}

// ── 載入指定日期資料 ──
async function loadDateData(idx) {
  const dateStr = adminDates[idx];
  if (!dateStr) return;
  document.getElementById('admin-date-label').textContent = dateStr + ' 預約清單';
  document.getElementById('supply-date-label').textContent = dateStr;

  showLoading('載入預約資料…');
  try {
    const resResult = await api('getReservations', { date: dateStr });
    hideLoading();

    const res = resResult.success ? resResult.reservations : [];
    allReservations = res;
    const activeRes = res.filter(function(r) { return r.status !== '已取消'; });
    const totalPax = activeRes.reduce(function(s,r) { return s + Number(r.pax); }, 0);
    document.getElementById('stat-res').textContent  = activeRes.length;
    document.getElementById('stat-pax').textContent  = totalPax;

    // 預約清單
    const list = document.getElementById('admin-res-list');
    document.getElementById('admin-date-label').textContent = dateStr + ' 預約清單（' + activeRes.length + ' 筆）';
    if (res.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--soft);padding:30px;background:white;border-radius:10px;">本日暫無預約</div>';
    } else {
      list.innerHTML = res.map(function(r) {
        var isCancelled = r.status === '已取消';
        var cardStyle = isCancelled ? 'opacity:.45;text-decoration:line-through;' : '';
        return '<div class="res-card" style="' + cardStyle + '">' +
          '<div class="res-time">' + r.time + '<span class="period">入座</span></div>' +
          '<div class="res-divider"></div>' +
          '<div class="res-info">' +
            '<div class="res-name">' + r.name + ' <span class="tag tag-gold">會員</span>' +
            (isCancelled ? ' <span style="font-size:11px;color:var(--danger);background:#fde8e8;padding:2px 6px;border-radius:4px;">已取消</span>' : '') +
            '</div>' +
            '<div class="res-meta">' + r.pax + ' 位</div>' +
            '<div class="res-orders">📋 ' + (r.orders || '未選餐飲') + '</div>' +
            (r.notes ? '<div style="font-size:11px;color:var(--danger);margin-top:3px;">💬 ' + r.notes + '</div>' : '') +
          '</div>' +
          '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">' +
            '<div class="pax-circle">' + r.pax + '</div>' +
            '<div class="pax-text">人</div>' +
            (!isCancelled ? '<button onclick="cancelReservation('' + r.orderId + '')" style="font-size:11px;padding:3px 8px;border:1px solid var(--danger);background:white;color:var(--danger);border-radius:4px;cursor:pointer;">取消</button>' : '') +
          '</div>' +
        '</div>';
      }).join('');
    }

    // 備料（分時段分類）
    renderSupply(res);

    // 歷史
    renderHistory(res);
  } catch(e) {
    hideLoading();
    alert('載入失敗');
  }
}

// ── 會員名單 ──
async function loadMembers() {
  try {
    const res = await api('getMembers');
    const grid = document.getElementById('member-grid');
    document.getElementById('stat-members').textContent = res.members ? res.members.length : '—';

    if (!res.success || !res.members || res.members.length === 0) {
      grid.innerHTML = '<div style="color:var(--soft);font-size:13px;grid-column:1/-1;">無會員資料，請至 Google Sheets「會員名單」工作表新增</div>';
      return;
    }
    grid.innerHTML = res.members.map(m => `
      <div class="member-card">
        <div class="member-avatar">${m.name[0]}</div>
        <div>
          <div class="member-name">${m.name}</div>
          <div class="member-org">${m.org || ''}</div>
          <div class="member-contact">${m.phone || ''} ${m.email ? '· '+m.email : ''}</div>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('member-grid').innerHTML = '<div style="color:var(--soft);font-size:13px;grid-column:1/-1;">無法載入會員資料</div>';
  }
}

function renderHistory(rows) {
  const tbody = document.getElementById('history-tbody');
  const total = rows ? rows.length : 0;
  if (document.getElementById('stat-total')) document.getElementById('stat-total').textContent = total;
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--soft);padding:20px;">暫無資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(function(r) {
    var isCancelled = r.status === '已取消';
    var rowStyle = isCancelled ? 'style="opacity:.5;text-decoration:line-through;"' : '';
    var tagStyle = isCancelled ? 'style="background:#fde8e8;color:var(--danger);"' : '';
    return '<tr ' + rowStyle + '>' +
      '<td><strong>' + (r.name || '—') + '</strong></td>' +
      '<td>' + (r.date || adminDates[adminDateIdx] || '—') + '</td>' +
      '<td>' + (r.time || '—') + '</td>' +
      '<td>' + (r.pax || '—') + '</td>' +
      '<td style="font-size:12px;">' + (r.orders || '—') + '</td>' +
      '<td><span class="tag tag-gold" ' + tagStyle + '>' + (r.status || '待確認') + '</span></td>' +
      '</tr>';
  }).join('');
}

async function exportCSV() {
  showLoading('準備匯出…');
  const dateStr = adminDates[adminDateIdx] || '';
  const res = await api('getReservations', { date: dateStr });
  hideLoading();
  const rows = [['預約編號','預約日期','時段','姓名','Email','電話','人數','點餐內容','預估金額','備註','狀態']];
  (res.reservations || []).forEach(r => {
    rows.push([r.orderId, r.date, r.time, r.name, r.email||'', r.phone||'', r.pax, r.orders, r.total, r.notes, r.status]);
  });
  const csv  = rows.map(r => r.map(c => '"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = '卡薩布蘭加預約清單.csv';
  a.click();
}
